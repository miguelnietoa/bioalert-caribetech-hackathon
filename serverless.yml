service: bioalert
frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  region: us-east-1
  stage: ${opt:stage, 'hackathon'}
  profile: biofood-hackathon
  stackName: bioalert-${self:provider.stage}
  versionFunctions: false
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - ssm:GetParameter
            - ssm:GetParameters
            - ssm:GetParametersByPath
          Resource: 'arn:aws:ssm:${aws:region}:${aws:accountId}:parameter/bioalert/*'
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
          Resource: 'arn:aws:dynamodb:${aws:region}:${aws:accountId}:table/bioalert-conversations-${self:provider.stage}'
        - Effect: Allow
          Action:
            - ssm:PutParameter
            - ssm:GetParameter
          Resource: 'arn:aws:ssm:${aws:region}:${aws:accountId}:parameter/bioalert/*/cursors/*'
        - Effect: Allow
          Action:
            - s3:PutObject
          Resource: 'arn:aws:s3:::bioalert-web-${self:provider.stage}-${aws:accountId}/data/*'

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: false
    target: node20
    platform: node
    format: esm
    external:
      - '@aws-sdk/*'
      - '@aws-sdk/client-s3'

# Funciones se van agregando incrementalmente.
# Vacío al inicio: el primer deploy solo crea la infra (RDS, DynamoDB, SSM).
functions:
  allergen-polling:
    handler: lambdas/allergen-polling/index.handler
    timeout: 60
    memorySize: 512
    environment:
      STAGE: ${self:provider.stage}
    events:
      - schedule: rate(1 minute)
  absence-cron:
    handler: lambdas/absence-cron/index.handler
    timeout: 120
    memorySize: 512
    environment:
      STAGE: ${self:provider.stage}
      NIT_PILOTO: '900000680'
    events:
      - schedule: cron(0 17 ? * MON-FRI *)   # 12 PM Colombia = 17 UTC
  stock-cron:
    handler: lambdas/stock-cron/index.handler
    timeout: 60
    memorySize: 512
    environment:
      STAGE: ${self:provider.stage}
    events:
      - schedule: cron(0 12 ? * * *)   # 7 AM Colombia
  nutrition-weekly:
    handler: lambdas/nutrition-weekly/index.handler
    timeout: 300
    memorySize: 1024
    environment:
      STAGE: ${self:provider.stage}
      WEB_BUCKET: bioalert-web-${self:provider.stage}-${aws:accountId}
    events:
      - schedule: cron(0 23 ? * SUN *)   # Dom 6 PM Colombia
  cafeteria-weekly:
    handler: lambdas/cafeteria-weekly/index.handler
    timeout: 300
    memorySize: 1024
    environment:
      STAGE: ${self:provider.stage}
      WEB_BUCKET: bioalert-web-${self:provider.stage}-${aws:accountId}
    events:
      - schedule: cron(0 12 ? * MON *)   # Lun 7 AM Colombia

resources:
  Resources:

    # ───────────────────────────────────────────────
    # RDS PostgreSQL — clon del reto + tablas bioalert
    # ───────────────────────────────────────────────
    DBSecurityGroup:
      Type: AWS::EC2::SecurityGroup
      Properties:
        GroupName: bioalert-rds-${self:provider.stage}
        GroupDescription: 'bioalert RDS public access (hackathon only - scope down post-event)'
        SecurityGroupIngress:
          - IpProtocol: tcp
            FromPort: 5432
            ToPort: 5432
            CidrIp: 0.0.0.0/0
            Description: 'Open during 24h hackathon. Strong password protects.'

    Database:
      Type: AWS::RDS::DBInstance
      DeletionPolicy: Delete
      UpdateReplacePolicy: Delete
      Properties:
        DBInstanceIdentifier: bioalert-${self:provider.stage}
        Engine: postgres
        EngineVersion: '15.7'
        DBInstanceClass: db.t4g.micro
        AllocatedStorage: 20
        StorageType: gp3
        DBName: bioalert
        MasterUsername: bioalert_app
        MasterUserPassword: ${ssm:/bioalert/${self:provider.stage}/db/password}
        VPCSecurityGroups:
          - !GetAtt DBSecurityGroup.GroupId
        PubliclyAccessible: true
        BackupRetentionPeriod: 0
        StorageEncrypted: false
        DeletionProtection: false
        AutoMinorVersionUpgrade: true
        Tags:
          - Key: Project
            Value: bioalert
          - Key: Stage
            Value: ${self:provider.stage}

    DBHostParam:
      Type: AWS::SSM::Parameter
      Properties:
        Name: /bioalert/${self:provider.stage}/db/host
        Type: String
        Value: !GetAtt Database.Endpoint.Address
        Description: 'RDS endpoint hostname (resolved post-deploy)'

    DBPortParam:
      Type: AWS::SSM::Parameter
      Properties:
        Name: /bioalert/${self:provider.stage}/db/port
        Type: String
        Value: !GetAtt Database.Endpoint.Port

    # ───────────────────────────────────────────────
    # DynamoDB — sesiones conversacionales (TTL 1h)
    # ───────────────────────────────────────────────
    ConversationsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Delete
      Properties:
        TableName: bioalert-conversations-${self:provider.stage}
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: phone_e164
            AttributeType: S
        KeySchema:
          - AttributeName: phone_e164
            KeyType: HASH
        TimeToLiveSpecification:
          AttributeName: expires_at
          Enabled: true

    # ───────────────────────────────────────────────
    # S3 — vistas web estáticas (nutrition-report, cafeteria-insights)
    # ───────────────────────────────────────────────
    WebBucket:
      Type: AWS::S3::Bucket
      DeletionPolicy: Delete
      Properties:
        BucketName: bioalert-web-${self:provider.stage}-${aws:accountId}
        OwnershipControls:
          Rules:
            - ObjectOwnership: BucketOwnerEnforced
        PublicAccessBlockConfiguration:
          BlockPublicAcls: false
          BlockPublicPolicy: false
          IgnorePublicAcls: false
          RestrictPublicBuckets: false
        WebsiteConfiguration:
          IndexDocument: index.html

    WebBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref WebBucket
        PolicyDocument:
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: '*'
              Action: 's3:GetObject'
              Resource: !Sub '${WebBucket.Arn}/*'

  Outputs:
    DBEndpoint:
      Description: 'RDS endpoint (host)'
      Value: !GetAtt Database.Endpoint.Address
      Export:
        Name: bioalert-${self:provider.stage}-db-host
    DBSecurityGroupId:
      Value: !GetAtt DBSecurityGroup.GroupId
    ConversationsTableName:
      Value: !Ref ConversationsTable
    WebBucketUrl:
      Description: 'S3 website URL para las vistas web'
      Value: !GetAtt WebBucket.WebsiteURL
      Export:
        Name: bioalert-${self:provider.stage}-web-url
